<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiTrack — Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🚛</div>
        <h1>LogiTrack</h1>
        <p>Fleet Logistics Management Platform</p>
      </div>

      <!-- Role Selector -->
      <div class="role-tabs">
        <div class="role-tab active" data-role="admin" onclick="selectRole('admin')">
          <span class="role-tab-icon">⚙️</span>Admin
        </div>
        <div class="role-tab" data-role="driver" onclick="selectRole('driver')">
          <span class="role-tab-icon">🚛</span>Driver
        </div>
        <div class="role-tab" data-role="user" onclick="selectRole('user')">
          <span class="role-tab-icon">📦</span>Customer
        </div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" style="margin-top:4px;">
          Sign In
        </button>
      </form>

      <div class="divider">or</div>
      <a href="/register.html" class="btn btn-full" style="justify-content:center; text-decoration:none;">Create an Account</a>

      <div class="demo-box">
        <div class="demo-box-title">Demo Credentials</div>
        <div class="demo-row">
          <span>Admin</span>
          <span class="demo-link" onclick="fillCreds('admin@logistics.com','admin123','admin')">admin@logistics.com / admin123</span>
        </div>
        <div class="demo-row">
          <span>Driver</span>
          <span class="demo-link" onclick="fillCreds('ravi@driver.com','driver123','driver')">ravi@driver.com / driver123</span>
        </div>
        <div class="demo-row">
          <span>Customer</span>
          <span class="demo-link" onclick="fillCreds('neha@user.com','user123','user')">neha@user.com / user123</span>
        </div>
        <div style="margin-top:10px; font-size:11px; color:var(--text-3);">Run <code style="background:var(--border);padding:1px 5px;border-radius:3px;">node seed.js</code> from project root to load demo data.</div>
      </div>
    </div>
  </div>

  <script src="/utils.js"></script>
  <script>
    // Redirect if already logged in
    (function() {
      const u = auth.getUser();
      if (u && auth.getToken()) {
        window.location.href = `/${u.role === 'admin' ? 'admin' : u.role === 'driver' ? 'driver' : 'user'}.html`;
      }
    })();

    let selectedRole = 'admin';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-role="${role}"]`).classList.add('active');
    }

    function fillCreds(email, pass, role) {
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = pass;
      selectRole(role);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const data = await api.post('/api/auth/login', {
          email: document.getElementById('loginEmail').value.trim(),
          password: document.getElementById('loginPassword').value
        });
        auth.save(data, data.token);
        toast.success(`Welcome, ${data.name}!`);
        setTimeout(() => {
          if (data.role === 'admin') window.location.href = '/admin.html';
          else if (data.role === 'driver') window.location.href = '/driver.html';
          else window.location.href = '/user.html';
        }, 500);
      } catch (err) {
        toast.error(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
